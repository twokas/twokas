<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Auth</title>
</head>
<body>
<!-- Página mínima de retorno do OAuth.
     Usada APENAS dentro do iframe invisível de renovação de token.
     Não carrega o site, então não causa o "flash" do gate R-18.
     Ela só repassa o token para a janela principal e some. -->
<script>
  // O Google redireciona para cá com o token no #hash.
  // Repassa para a página pai (o site) e encerra.
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ tipo: 'oauth_token', hash: window.location.hash }, window.location.origin);
  }
</script>
</body>
</html>
