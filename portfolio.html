<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio — Twokas Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --amarelo: #FFD600; --laranja: #FF6B1A; --preto: #111111;
  --preto2: #1C1C1C; --creme: #FFF8E7; --cinza: #888;
  --font-titulo: 'Bebas Neue', sans-serif;
  --font-corpo: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-corpo); background: var(--preto); color: var(--creme); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }

nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--preto); border-bottom: 1px solid rgba(255,214,0,.15);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 64px;
}
.nav-logo { font-family: var(--font-titulo); font-size: 28px; letter-spacing: 2px; color: var(--amarelo); }
.nav-logo span { color: var(--laranja); }
.nav-back {
  font-family: var(--font-mono); font-size: 12px; color: var(--cinza);
  border: 1px solid rgba(255,255,255,.12); padding: 7px 16px; border-radius: 99px; transition: all .2s;
}
.nav-back:hover { border-color: var(--amarelo); color: var(--amarelo); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 13px; font-family: var(--font-mono); color: var(--cinza); letter-spacing: .5px; transition: color .2s; }
.nav-links a:hover, .nav-links a.nav-ativo { color: var(--amarelo); }
.nav-cta {
  padding: 8px 20px; border-radius: 99px;
  background: var(--laranja) !important; color: #fff !important;
  font-family: var(--font-mono); font-size: 12px; letter-spacing: .5px; transition: opacity .2s;
}
.nav-cta:hover { opacity: .85; }
.filtro-nsfw { border-color: rgba(255,107,26,.4) !important; color: var(--laranja) !important; }
.filtro-nsfw.ativo { background: var(--laranja) !important; color: #fff !important; border-color: var(--laranja) !important; }

.page-header { padding: 60px 80px 40px; }
.page-eyebrow { font-family: var(--font-mono); font-size: 11px; color: var(--laranja); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.page-titulo { font-family: var(--font-titulo); font-size: clamp(56px, 8vw, 96px); line-height: 1; }
.page-titulo span { color: var(--laranja); }

.filtros-bar {
  padding: 0 80px 32px;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.filtro-btn {
  padding: 8px 18px; border-radius: 99px; font-family: var(--font-mono); font-size: 12px;
  border: 1px solid rgba(255,255,255,.15); color: var(--cinza); cursor: pointer;
  background: none; transition: all .2s;
}
.filtro-btn.ativo, .filtro-btn:hover { border-color: var(--amarelo); color: var(--amarelo); }
.filtros-count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--cinza); }

.galeria { padding: 40px 80px 80px; }
.galeria-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
}
.galeria-item {
  aspect-ratio: 3/4; border-radius: 12px; overflow: hidden;
  background: var(--preto2); cursor: pointer; position: relative;
}
.galeria-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.galeria-item:hover img { transform: scale(1.05); }
.galeria-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 50%);
  opacity: 0; transition: opacity .3s;
  display: flex; align-items: flex-end; padding: 20px; flex-direction: column; justify-content: flex-end;
}
.galeria-item:hover .galeria-overlay { opacity: 1; }
.galeria-overlay-titulo { font-family: var(--font-titulo); font-size: 20px; color: #fff; }
.galeria-overlay-cat {
  font-family: var(--font-mono); font-size: 10px; color: var(--amarelo);
  border: 1px solid var(--amarelo); padding: 2px 8px; border-radius: 99px; margin-top: 6px;
  width: fit-content;
}
.galeria-vazio { grid-column: 1/-1; text-align: center; padding: 80px; font-family: var(--font-mono); font-size: 13px; color: var(--cinza); }

#modal-img {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.94); align-items: center; justify-content: center;
}
#modal-img.aberto { display: flex; }
#modal-img img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
#modal-close {
  position: absolute; top: 20px; right: 24px;
  font-family: var(--font-mono); font-size: 13px; color: var(--cinza);
  cursor: pointer; background: none; border: none;
}

@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .page-header, .filtros-bar, .galeria { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">TWOKAS <span>STUDIO</span></a>
  <div class="nav-links">
    <a href="portfolio.html" class="nav-ativo">Portfólio</a>
    <a href="index.html#packs">Packs</a>
    <a href="cmyk.html">CMYK</a>
    <a href="index.html#comissoes">Comissões</a>
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#comissoes" class="nav-cta">Solicitar comissão</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-eyebrow">Trabalhos</div>
  <h1 class="page-titulo">Port<span>fólio</span></h1>
</div>

<div class="filtros-bar">
  <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
  <button class="filtro-btn" onclick="filtrar('original', this)">Originais</button>
  <button class="filtro-btn" onclick="filtrar('comissao', this)">Comissões</button>
  <button class="filtro-btn" onclick="filtrar('fanart', this)">Fanart</button>
  <button class="filtro-btn filtro-nsfw" onclick="filtrarNSFW(this)">+18 / NSFW</button>
  <span class="filtros-count" id="count">0 obras</span>
</div>

<!-- Modal confirmação NSFW -->
<div id="modal-nsfw" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);align-items:center;justify-content:center;">
  <div style="background:#1C1C1C;border:1px solid rgba(255,107,26,.3);border-radius:16px;padding:40px 48px;max-width:440px;width:90%;text-align:center;">
    <div style="font-family:var(--font-titulo);font-size:48px;color:var(--laranja);margin-bottom:8px;">+18</div>
    <div style="font-family:var(--font-titulo);font-size:28px;color:var(--creme);margin-bottom:16px;">Conteúdo adulto</div>
    <p style="font-size:14px;color:rgba(255,248,231,.6);line-height:1.7;margin-bottom:28px;">Esta categoria contém ilustrações explícitas (NSFW). Ao continuar, você confirma que tem 18 anos ou mais.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button onclick="confirmarNSFW()" style="padding:12px 28px;border-radius:8px;background:var(--laranja);border:none;color:#fff;font-family:var(--font-titulo);font-size:20px;cursor:pointer;letter-spacing:1px;">Confirmo, tenho 18+</button>
      <button onclick="fecharNSFW()" style="padding:12px 28px;border-radius:8px;background:none;border:2px solid rgba(255,255,255,.2);color:rgba(255,248,231,.5);font-family:var(--font-titulo);font-size:20px;cursor:pointer;letter-spacing:1px;">Voltar</button>
    </div>
  </div>
</div>

<div class="galeria">
  <div class="galeria-grid" id="galeria-grid">
    <div class="galeria-vazio">Carregando portfólio...</div>
  </div>
</div>

<div id="modal-img">
  <button id="modal-close" onclick="fecharModal()">ESC / Fechar ✕</button>
  <img id="modal-src" src="" alt="">
</div>

<script>
const NOME_ARQUIVO_PT = 'twokas_dados_pt.json';
const NOME_ARQUIVO_EN = 'twokas_dados_en.json';
let portfolio = [];
let catAtual = 'todos';

function driveUrlParaImagem(url, tamanho) {
  const m1 = url.match(/\/file\/d\/([^/]+)/);
  const m2 = url.match(/[?&]id=([^&]+)/);
  const id = m1 ? m1[1] : m2 ? m2[1] : null;
  if (id) {
    if (tamanho === 'full') return `https://drive.google.com/uc?export=view&id=${id}`;
    return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
  }
  return url;
}

function carregarDados() {
  try {
    const raw = localStorage.getItem('tw_dados_pt');
    if (raw) {
      const dados = JSON.parse(raw);
      portfolio = dados.portfolio || [];
    }
  } catch(e) {}
  // Exclui NSFW por padrão na carga inicial
  renderGaleria(portfolio.filter(i => i.categoria !== 'nsfw'));
}

function renderGaleria(items) {
  const grid = document.getElementById('galeria-grid');
  const count = document.getElementById('count');
  if (!items || items.length === 0) {
    grid.innerHTML = '<div class="galeria-vazio">Nenhuma obra encontrada.</div>';
    count.textContent = '0 obras';
    return;
  }
  count.textContent = items.length + ' obra' + (items.length !== 1 ? 's' : '');
  grid.innerHTML = items.map(img => `
    <div class="galeria-item" onclick="abrirModal('${driveUrlParaImagem(img.url, 'full')}')">
      <img src="${driveUrlParaImagem(img.url)}" alt="${img.titulo}" loading="lazy">
      <div class="galeria-overlay">
        <div class="galeria-overlay-titulo">${img.titulo}</div>
        <div class="galeria-overlay-cat">${img.categoria}</div>
      </div>
    </div>
  `).join('');
}

function filtrar(cat, btn) {
  catAtual = cat;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  // Nunca mostra NSFW ao filtrar categorias normais
  const sem_nsfw = portfolio.filter(i => i.categoria !== 'nsfw');
  const items = cat === 'todos' ? sem_nsfw : sem_nsfw.filter(i => i.categoria === cat);
  renderGaleria(items);
}

function filtrarNSFW(btn) {
  // Mostra modal de confirmação
  const modal = document.getElementById('modal-nsfw');
  modal.style.display = 'flex';
  modal._btn = btn;
}

function confirmarNSFW() {
  const modal = document.getElementById('modal-nsfw');
  modal.style.display = 'none';
  const btn = modal._btn;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  catAtual = 'nsfw';
  const items = portfolio.filter(i => i.categoria === 'nsfw');
  renderGaleria(items);
}

function fecharNSFW() {
  document.getElementById('modal-nsfw').style.display = 'none';
}

function abrirModal(url) {
  document.getElementById('modal-src').src = url;
  document.getElementById('modal-img').classList.add('aberto');
}
function fecharModal() {
  document.getElementById('modal-img').classList.remove('aberto');
  document.getElementById('modal-src').src = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { fecharModal(); fecharNSFW(); }
});

carregarDados();
</script>
</body>
</html>
